version: '3.8'

services:
  app-staging:
    build: .
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:password@db-staging:5432/translator_db_staging
      - REDIS_HOST=redis-staging
      - MCP_SERVER_URL=http://wiremock:8080
      - SENTRY_DSN=http://sentry-mock:9000
    depends_on:
      - db-staging
      - redis-staging
      - wiremock
    networks:
      - staging_network

  db-staging:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: translator_db_staging
    networks:
      - staging_network

  redis-staging:
    image: redis:7.2-alpine
    networks:
      - staging_network

  wiremock:
    image: wiremock/wiremock:3.5.2
    ports:
      - "8081:8080"
    volumes:
      - ./tests/wiremock:/home/wiremock
    networks:
      - staging_network

  sentry-mock:
    image: getsentry/sentry-cli
    command: ["sentry-cli", "send-event", "-m", "Staging environment initialized"]
    # In a real scenario, this would be a mock endpoint or a real Sentry DSN.
    # For now, we'll just use it as a placeholder for the concept.
    networks:
      - staging_network

networks:
  staging_network:
    driver: bridge
