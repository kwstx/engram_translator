apiVersion: 1

groups:
  - orgId: 1
    name: translator-alerts
    folder: Translator
    interval: 1m
    rules:
      - uid: translation-error-rate-high
        title: Translation Error Rate High
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: translation_error_rate{channel="orchestrator"}
              interval: ""
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              expression: A
              type: reduce
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              expression: B > 0.05
              type: threshold
        for: 5m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: Translation error rate above 5% for 5 minutes
        labels:
          severity: high
