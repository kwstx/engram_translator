apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: translator-middleware
  labels:
    app: translator-middleware
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: translator-middleware
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
