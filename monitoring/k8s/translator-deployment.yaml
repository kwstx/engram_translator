apiVersion: apps/v1
kind: Deployment
metadata:
  name: translator-middleware
  labels:
    app: translator-middleware
spec:
  replicas: 2
  selector:
    matchLabels:
      app: translator-middleware
  template:
    metadata:
      labels:
        app: translator-middleware
    spec:
      containers:
        - name: app
          image: your-registry/translator-middleware:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: translator-env
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
